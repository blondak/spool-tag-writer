apiVersion: apps/v1
kind: Deployment
metadata:
  name: spool-tag-writer-web
  namespace: spool-tag-writer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spool-tag-writer
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spool-tag-writer
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: ghcr.io/blondak/spool-tag-writer:latest
          imagePullPolicy: Always
          command: ["scripts/run.sh"]
          args: ["web"]
          envFrom:
            - configMapRef:
                name: spool-tag-writer-config
            - secretRef:
                name: spool-tag-writer-secret
                optional: true
          volumeMounts:
            - name: spool-tag-writer-tls
              mountPath: /etc/spool-tag-writer/tls
              readOnly: true
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: spool-tag-writer-tls
          secret:
            secretName: spool-tag-writer-tls
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: spool-tag-writer-web
  namespace: spool-tag-writer
spec:
  selector:
    app.kubernetes.io/name: spool-tag-writer
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: http
