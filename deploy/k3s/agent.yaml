apiVersion: apps/v1
kind: Deployment
metadata:
  name: spool-tag-writer-agent
  namespace: spool-tag-writer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: spool-tag-writer
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spool-tag-writer
        app.kubernetes.io/component: agent
    spec:
      containers:
        - name: agent
          image: ghcr.io/blondak/spool-tag-writer:latest
          imagePullPolicy: Always
          command: ["scripts/run.sh"]
          args: ["agent"]
          envFrom:
            - configMapRef:
                name: spool-tag-writer-config
            - secretRef:
                name: spool-tag-writer-secret
                optional: true
          volumeMounts:
            - name: spool-tag-writer-tls
              mountPath: /etc/spool-tag-writer/tls
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              memory: 384Mi
      volumes:
        - name: spool-tag-writer-tls
          secret:
            secretName: spool-tag-writer-tls
            optional: true
