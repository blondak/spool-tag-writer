name: U1 Package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.meta.outputs.package_version }}
      package_file: ${{ steps.meta.outputs.package_file }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Build frontend
        run: |
          npm ci
          npm run build

      - name: Compute package metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            package_version="${GITHUB_REF_NAME}"
          else
            branch_slug="${GITHUB_REF_NAME//\//-}"
            package_version="${branch_slug}-${GITHUB_SHA::7}"
          fi
          echo "package_version=${package_version}" >>"$GITHUB_OUTPUT"
          echo "package_file=spool-tag-writer-u1-${package_version}.tar.gz" >>"$GITHUB_OUTPUT"

      - name: Create U1 package
        shell: bash
        run: |
          chmod +x scripts/u1-create-package.sh
          ./scripts/u1-create-package.sh "${{ steps.meta.outputs.package_version }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: spool-tag-writer-u1-${{ steps.meta.outputs.package_version }}
          path: |
            dist/u1/${{ steps.meta.outputs.package_file }}
            dist/u1/${{ steps.meta.outputs.package_file }}.sha256
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          PACKAGE_FILE: dist/u1/${{ steps.meta.outputs.package_file }}
          PACKAGE_SHA256_FILE: dist/u1/${{ steps.meta.outputs.package_file }}.sha256
        shell: bash
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$PACKAGE_FILE" "$PACKAGE_SHA256_FILE" --clobber
            exit 0
          fi

          release_args=(
            release
            create
            "$TAG_NAME"
            "$PACKAGE_FILE"
            "$PACKAGE_SHA256_FILE"
            --title "$TAG_NAME"
            --verify-tag
          )

          if [[ "$TAG_NAME" == *-* ]]; then
            release_args+=(--prerelease)
          fi

          gh "${release_args[@]}"

  build-container:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/blondak/spool-tag-writer
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
