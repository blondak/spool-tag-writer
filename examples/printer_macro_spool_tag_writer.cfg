# Requires Klipper [respond] to be enabled for console output.
[gcode_macro WRITE_SPOOL_TAG]
description: Writes the selected Spoolman spool to an NFC tag (ACR122U)
gcode:
  {% set sid = params.SPOOL_ID|default(0)|int %}
  {% set ftype = params.TYPE|default("") %}
  {% set brand = params.BRAND|default("") %}
  {% set subtype = params.SUBTYPE|default("") %}
  {% set min_t = params.MIN_TEMP|default("") %}
  {% set max_t = params.MAX_TEMP|default("") %}
  {% set bed_min_t = params.BED_MIN_TEMP|default(params.BED_TEMP|default("")) %}
  {% set bed_max_t = params.BED_MAX_TEMP|default(params.BED_TEMP|default("")) %}
  {% set color = params.COLOR_HEX|default("") %}
  {% if sid > 0 %}
    {action_call_remote_method("spool_tag_writer_write_spool_tag", spool_id=sid, TYPE=ftype, BRAND=brand, SUBTYPE=subtype, MIN_TEMP=min_t, MAX_TEMP=max_t, BED_MIN_TEMP=bed_min_t, BED_MAX_TEMP=bed_max_t, COLOR_HEX=color)}
  {% else %}
    {action_call_remote_method("spool_tag_writer_write_spool_tag", TYPE=ftype, BRAND=brand, SUBTYPE=subtype, MIN_TEMP=min_t, MAX_TEMP=max_t, BED_MIN_TEMP=bed_min_t, BED_MAX_TEMP=bed_max_t, COLOR_HEX=color)}
  {% endif %}

[gcode_macro SHOW_FALLBACK_MAPPING]
description: Displays the Spool Tag Writer fallback mapping in the console
gcode:
  {action_call_remote_method("spool_tag_writer_show_fallback_mapping")}
